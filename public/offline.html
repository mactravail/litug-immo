<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hors ligne — Litug</title>
  <style>
    :root { color-scheme: light; }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: #ffffff; color: #3a3a3a; padding: 24px; text-align: center;
    }
    .card { max-width: 360px; }
    .logo { font-size: 22px; font-weight: 800; letter-spacing: 0.5px; color: #000; margin-bottom: 24px; }
    h1 { font-size: 20px; color: #000; margin: 0 0 12px; }
    p { font-size: 15px; line-height: 1.6; color: #737373; margin: 0 0 24px; }
    button {
      background: #000; color: #fff; border: 0; border-radius: 10px;
      font-size: 15px; font-weight: 600; padding: 12px 24px; cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Litug</div>
    <h1>Vous êtes hors ligne</h1>
    <p>Pas de connexion internet pour le moment. Vérifiez votre réseau, puis réessayez.</p>
    <button onclick="location.reload()">Réessayer</button>
  </div>
</body>
</html>
